global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'pdca-monitor'

# Rule files
rule_files: []

# Scrape configurations
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fastapi-backend'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          app: 'pdca-backend'
          environment: 'development'
